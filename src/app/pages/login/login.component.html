<div class="login-container">

  <h2>Login</h2>

  <form (ngSubmit)="fazerLogin()" #loginForm="ngForm">

    <div class="form-group">
      <label for="cpf">CPF</label>
      <input
        type="text"
        id="cpf"
        name="cpf"
        [(ngModel)]="cpf"
        (input)="limitarCPF()"
        required
        placeholder="Digite seu CPF"
      />
    </div>

    <div class="form-group">
      <label for="nascimento">Data de Nascimento</label>
      <input
        type="date"
        id="nascimento"
        name="nascimento"
        [(ngModel)]="nascimento"
        required
      />
    </div>

    <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
      Entrar
    </button>

    <p class="erro" *ngIf="erro">{{ erro }}</p>
  </form>

  <p class="cadastro-texto">Não possui cadastro?</p>

  <button class="btn-cadastro" routerLink="/cadastro">
    Criar conta
  </button>

</div>
