<div class="login-container">

  <h2>Login</h2>

  <form #loginForm="ngForm" (ngSubmit)="fazerLogin()">

    <label for="cpf">CPF</label>
    <input
      type="text"
      id="cpf"
      name="cpf"
      [(ngModel)]="cpf"
      (input)="limitarCPF()"
      required
      placeholder="Digite seu CPF"
    />

    <label for="nascimento">Data de Nascimento</label>
    <input
      type="date"
      id="nascimento"
      name="nascimento"
      [(ngModel)]="nascimento"
      required
    />

    <button class="btn-login" type="submit" [disabled]="loginForm.invalid">
      Entrar
    </button>

    <p class="erro" *ngIf="erro">{{ erro }}</p>
  </form>

  <p class="cadastro-texto">Não possui cadastro?</p>

  <button class="btn-cadastro" routerLink="/cadastro">
    Criar conta
  </button>

</div>

<div class="usuario-info" *ngIf="usuarioLogado">
  <h2>Usuário Logado</h2>

  <p><strong>Nome:</strong> {{ usuarioLogado.nome }}</p>
  <p><strong>CPF:</strong> {{ usuarioLogado.cpf }}</p>
  <p><strong>Nascimento:</strong> {{ usuarioLogado.nascimento }}</p>

  <button class="btn-sair" (click)="sair()">Sair</button>
</div>
