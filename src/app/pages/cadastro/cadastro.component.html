<div class="cadastro-container">

  <h2>Cadastro de Usuário</h2>

  <label>Nome</label>
  <input type="text" [(ngModel)]="nome" placeholder="Seu nome completo" />

  <label>CPF</label>
  <input 
    type="text"
    [(ngModel)]="cpf"
    (input)="limitarCPF()"
    maxlength="11"
    placeholder="Digite seu CPF"
  />

  <label>Data de Nascimento</label>
  <input type="date" [(ngModel)]="nascimento" />

  <button (click)="registrar()">Cadastrar</button>

  <p class="erro" *ngIf="erro">{{ erro }}</p>
  <p class="sucesso" *ngIf="sucesso">{{ sucesso }}</p>

</div>
